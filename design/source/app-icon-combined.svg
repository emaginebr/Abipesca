<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Abipesca App Icon Completo - 1024x1024 -->
<!-- Composicao: fundo navy + dois peixes estilizados centralizados -->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo navy -->
  <rect x="0" y="0" width="1024" height="1024" rx="180" ry="180" fill="#203e64" />

  <!-- Peixes centralizados (escalados de 66dp para ~600px, centrado em 512,512) -->
  <g transform="translate(212, 262) scale(9.09)">
    <!-- Peixe superior (teal/azul) -->
    <path d="M 7,21 C 13,9 27,5 37,9 C 47,13 55,19 61,17 C 57,21 49,23 41,21 C 33,19 21,25 7,21 Z"
          fill="#0693e3" />
    <!-- Cauda do peixe superior -->
    <path d="M 7,21 C 3,17 1,13 3,9 C 5,13 7,17 7,21 Z"
          fill="#0693e3" />

    <!-- Peixe inferior (laranja/dourado) -->
    <path d="M 59,41 C 53,53 39,57 29,53 C 19,49 11,43 5,45 C 9,41 17,39 25,41 C 33,43 45,37 59,41 Z"
          fill="#ff6900" />
    <!-- Cauda do peixe inferior -->
    <path d="M 59,41 C 63,45 65,49 63,53 C 61,49 59,45 59,41 Z"
          fill="#ff6900" />

    <!-- Olho do peixe superior -->
    <circle cx="49" cy="15" r="2" fill="#203e64" />

    <!-- Olho do peixe inferior -->
    <circle cx="17" cy="47" r="2" fill="#203e64" />
  </g>

  <!-- Texto ABIPESCA -->
  <text x="512" y="780" text-anchor="middle"
        font-family="'Open Sans', 'Segoe UI', Arial, sans-serif"
        font-weight="700" font-size="88" fill="#FFFFFF" letter-spacing="8">
    ABIPESCA
  </text>
</svg>
