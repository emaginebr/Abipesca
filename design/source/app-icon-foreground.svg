<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Abipesca App Icon Foreground - Dois peixes estilizados -->
<!-- Safe zone: 66dp centrado (coords 21 a 87 no viewBox 108x108) -->
<svg width="108" height="108" viewBox="0 0 108 108" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="safeZone">
      <rect x="21" y="21" width="66" height="66" />
    </clipPath>
  </defs>
  <g clip-path="url(#safeZone)">
    <!-- Peixe superior (teal/azul) - curva da esquerda para direita -->
    <path d="M 28,42 C 34,30 48,26 58,30 C 68,34 76,40 82,38 C 78,42 70,44 62,42 C 54,40 42,46 28,42 Z"
          fill="#0693e3" opacity="0.95" />
    <!-- Cauda do peixe superior -->
    <path d="M 28,42 C 24,38 22,34 24,30 C 26,34 28,38 28,42 Z"
          fill="#0693e3" opacity="0.95" />

    <!-- Peixe inferior (laranja/dourado) - curva da direita para esquerda -->
    <path d="M 80,62 C 74,74 60,78 50,74 C 40,70 32,64 26,66 C 30,62 38,60 46,62 C 54,64 66,58 80,62 Z"
          fill="#ff6900" opacity="0.95" />
    <!-- Cauda do peixe inferior -->
    <path d="M 80,62 C 84,66 86,70 84,74 C 82,70 80,66 80,62 Z"
          fill="#ff6900" opacity="0.95" />

    <!-- Olho do peixe superior -->
    <circle cx="70" cy="36" r="2" fill="#203e64" />

    <!-- Olho do peixe inferior -->
    <circle cx="38" cy="68" r="2" fill="#203e64" />
  </g>
</svg>
