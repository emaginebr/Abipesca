<!-- Abipesca Notification Icon - Silhueta branca de peixe -->
<!-- Android notification icons devem ser monocromáticos (branco sobre transparente) -->
<svg width="24" height="24" viewBox="0 0 24 24" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Peixe simplificado - silhueta única -->
  <path d="M 4,12 C 6,7 10,5 14,7 C 17,8.5 19,10 21,9.5
           C 20,11 18,12 16,11.5 C 13,10.5 9,13 4,12 Z"
        fill="#FFFFFF" />
  <!-- Cauda -->
  <path d="M 4,12 C 2.5,10 2,8 3,6.5 C 3.5,8.5 4,10 4,12 Z"
        fill="#FFFFFF" />
  <!-- Barbatana inferior -->
  <path d="M 11,11.5 C 11,13.5 10,15 8.5,15.5 C 9.5,14 10.5,12.5 11,11.5 Z"
        fill="#FFFFFF" />
  <!-- Olho (negativo) -->
  <circle cx="16.5" cy="9" r="1" fill="#000000" opacity="0" />
</svg>
