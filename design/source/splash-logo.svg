<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Abipesca Splash Screen Logo -->
<!-- Peixes + texto ABIPESCA em branco sobre fundo transparente -->
<!-- O fundo da splash screen (#203e64) e definido no .csproj, nao no SVG -->
<svg width="512" height="512" viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg">
  <!-- Peixes centralizados na parte superior -->
  <g transform="translate(81, 80) scale(5.3)">
    <!-- Peixe superior (branco) -->
    <path d="M 7,21 C 13,9 27,5 37,9 C 47,13 55,19 61,17 C 57,21 49,23 41,21 C 33,19 21,25 7,21 Z"
          fill="#FFFFFF" />
    <!-- Cauda do peixe superior -->
    <path d="M 7,21 C 3,17 1,13 3,9 C 5,13 7,17 7,21 Z"
          fill="#FFFFFF" />

    <!-- Peixe inferior (branco) -->
    <path d="M 59,41 C 53,53 39,57 29,53 C 19,49 11,43 5,45 C 9,41 17,39 25,41 C 33,43 45,37 59,41 Z"
          fill="#FFFFFF" />
    <!-- Cauda do peixe inferior -->
    <path d="M 59,41 C 63,45 65,49 63,53 C 61,49 59,45 59,41 Z"
          fill="#FFFFFF" />

    <!-- Olhos (vazados para mostrar o fundo) -->
    <circle cx="49" cy="15" r="2" fill="#203e64" />
    <circle cx="17" cy="47" r="2" fill="#203e64" />
  </g>

  <!-- Texto ABIPESCA -->
  <text x="256" y="420" text-anchor="middle"
        font-family="'Open Sans', 'Segoe UI', Arial, sans-serif"
        font-weight="700" font-size="52" fill="#FFFFFF" letter-spacing="6">
    ABIPESCA
  </text>
</svg>
